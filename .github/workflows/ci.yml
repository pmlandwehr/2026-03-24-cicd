# two things: when the workflow will run, what jobs will run.

name: My CI Workflow

on:
  push:
    branches: [main]  # will only run when we trigger the main branch.
  pull_request:  # will run whenever someone creates a pull request
  workflow_dispatch:  # will run whenever you choose to dispatch it.

jobs:
  hello:
    name: My Hello Job
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello!"

  goodbye:
    name: My Goodbye Job
    needs: hello
    runs-on: windows-latest
    steps:
      - run: echo "Goodbye!"

  ls:
    name: My List Job.
    runs-on: ubuntu-latest
    steps:
      - name: Echo the path
        run: pwd
      - name: List the directory.
        run: ls .
      - name: List the parent.
        run: ls ..
      - name: List the grandparent.
        run: ls ../..

  test:
    name: Test the Python package.
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo.
        uses: actions/checkout@v6
      - name: Install a specific python version
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Echo the path
        run: pwd
      - name: List the directory.
        run: ls .
      - name: List the parent.
        run: ls ..
      - name: List the grandparent.
        run: ls ../..
      - name: Install the package.
        run: pip install .[test]
      - name: Run the tests.
        run: pytest -vv